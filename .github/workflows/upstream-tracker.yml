name: upstream-tracker

# Watches upstream rohitg00/agentmemory's deploy/fly/Dockerfile for
# changes to the III_VERSION pin and re-vendors entrypoint.sh from the
# same source. AGENTMEMORY_VERSION is intentionally NOT tracked here:
# upstream's Dockerfile lags 10+ versions behind their npm releases, so
# we let Renovate handle agentmemory bumps via the npm datasource and
# treat upstream's Dockerfile as the authoritative source ONLY for the
# iii compatibility pin (the one that breaks if mis-set, per upstream's
# own Dockerfile comments).

on:
  schedule:
    - cron: "0 6 * * *"  # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Diff upstream iii pin against ours
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          UP_DOCKERFILE=$(gh api repos/rohitg00/agentmemory/contents/deploy/fly/Dockerfile --jq .content | base64 -d)
          UP_III=$(printf '%s\n' "$UP_DOCKERFILE" | grep -E '^ARG III_VERSION=' | head -1 | cut -d= -f2)
          OUR_III=$(grep -E '^ARG III_VERSION=' Dockerfile | head -1 | cut -d= -f2)
          echo "up_iii=${UP_III}" >> "$GITHUB_OUTPUT"
          echo "our_iii=${OUR_III}" >> "$GITHUB_OUTPUT"
          if [ "$UP_III" != "$OUR_III" ]; then
            echo "needs_sync=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_sync=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Re-vendor entrypoint.sh from upstream HEAD
        if: steps.diff.outputs.needs_sync == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/rohitg00/agentmemory/contents/deploy/fly/entrypoint.sh \
            --jq .content | base64 -d > entrypoint.sh
          chmod +x entrypoint.sh

      - name: Bump III pins in Dockerfile
        if: steps.diff.outputs.needs_sync == 'true'
        run: |
          sed -i -E \
            -e "s/^ARG III_VERSION=.*/ARG III_VERSION=${{ steps.diff.outputs.up_iii }}/" \
            -e "s/^ARG III_SDK_VERSION=.*/ARG III_SDK_VERSION=${{ steps.diff.outputs.up_iii }}/" \
            Dockerfile

      - uses: peter-evans/create-pull-request@v8
        if: steps.diff.outputs.needs_sync == 'true'
        with:
          branch: upstream-sync/iii-${{ steps.diff.outputs.up_iii }}
          commit-message: "chore: upstream-sync iii ${{ steps.diff.outputs.up_iii }}"
          title: "upstream-sync: iii ${{ steps.diff.outputs.up_iii }}"
          body: |
            Upstream rohitg00/agentmemory's `deploy/fly/Dockerfile` now pins iii
            to `${{ steps.diff.outputs.up_iii }}` (we were on `${{ steps.diff.outputs.our_iii }}`).

            This is the "load-bearing" pin the upstream maintainer changes only
            when agentmemory has been refactored for a new iii architecture.
            `entrypoint.sh` re-vendored from upstream HEAD as part of the bump.

            **Review before merge:** scan the diff in `entrypoint.sh` — upstream
            sometimes restructures it in the same commit that bumps iii.

            Renovate handles `AGENTMEMORY_VERSION` separately via the npm
            datasource; that pin is NOT tracked by this workflow.
          labels: upstream-sync
